name: Daily Social Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate without publishing"
        required: false
        default: "false"
  schedule:
    # 09:00 KST
    - cron: "0 0 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-publish:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      META_GRAPH_VERSION: ${{ secrets.META_GRAPH_VERSION }}
      META_SYSTEM_USER_ACCESS_TOKEN: ${{ secrets.META_SYSTEM_USER_ACCESS_TOKEN }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
      LINKEDIN_VERSION: ${{ secrets.LINKEDIN_VERSION || '202605' }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
      X_OAUTH1_ACCESS_TOKEN: ${{ secrets.X_OAUTH1_ACCESS_TOKEN }}
      X_OAUTH1_ACCESS_TOKEN_SECRET: ${{ secrets.X_OAUTH1_ACCESS_TOKEN_SECRET }}
      INSTAGRAM_COOLDOWN_UNTIL: ${{ vars.INSTAGRAM_COOLDOWN_UNTIL }}
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate date-specific content
        run: |
          CONTENT_DIR="$(python scripts/generate_daily_content.py --date "$(date +%F)")"
          echo "CONTENT_DIR=${CONTENT_DIR}" >> "$GITHUB_ENV"
          echo "CONTENT_SLUG=$(basename "${CONTENT_DIR}")" >> "$GITHUB_ENV"

      - name: Build X browser publishing handoff
        run: |
          python scripts/x_browser_handoff.py \
            --caption "${CONTENT_DIR}/x-post.txt" \
            --thread "${CONTENT_DIR}/x-thread.txt" \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --out "${CONTENT_DIR}/x-browser-handoff.html"

      - name: Prepare GitHub Pages asset folder
        shell: bash
        run: |
          PUBLIC_PATH="social/${GITHUB_RUN_ID}/${CONTENT_SLUG}"
          mkdir -p "_site/${PUBLIC_PATH}"
          cp "${CONTENT_DIR}/carousel/"*.png "_site/${PUBLIC_PATH}/"
          cp "${CONTENT_DIR}/x-browser-handoff.html" "_site/${PUBLIC_PATH}/"
          echo "CONTENT_DIR=${CONTENT_DIR}" >> "$GITHUB_ENV"
          echo "PUBLIC_PATH=${PUBLIC_PATH}" >> "$GITHUB_ENV"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Check Instagram cooldown
        id: instagram-cooldown
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python scripts/instagram_cooldown.py

      - name: Prevent duplicate Instagram publish
        id: duplicate-check
        if: ${{ github.event.inputs.dry_run != 'true' && steps.instagram-cooldown.outputs.should_publish == 'true' }}
        run: |
          python scripts/prevent_duplicate_instagram_publish.py \
            --caption "${CONTENT_DIR}/instagram-caption.txt"

      - name: Publish Instagram
        if: ${{ github.event.inputs.dry_run != 'true' && steps.instagram-cooldown.outputs.should_publish == 'true' && steps.duplicate-check.outputs.should_publish == 'true' }}
        run: |
          python scripts/meta_publish.py \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --public-base-url "${{ steps.deployment.outputs.page_url }}${PUBLIC_PATH}" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --facebook-caption "${CONTENT_DIR}/facebook-caption.txt" \
            --channels instagram \
            --out "${CONTENT_DIR}/instagram-publish-results.json" \
            --allow-failures

      - name: Publish Facebook
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          python scripts/meta_publish.py \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --public-base-url "${{ steps.deployment.outputs.page_url }}${PUBLIC_PATH}" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --facebook-caption "${CONTENT_DIR}/facebook-caption.txt" \
            --channels facebook \
            --out "${CONTENT_DIR}/facebook-publish-results.json"

      - name: Publish LinkedIn
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          python scripts/meta_publish.py \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --public-base-url "${{ steps.deployment.outputs.page_url }}${PUBLIC_PATH}" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --facebook-caption "${CONTENT_DIR}/facebook-caption.txt" \
            --linkedin-caption "${CONTENT_DIR}/linkedin-post.txt" \
            --channels linkedin \
            --out "${CONTENT_DIR}/linkedin-publish-results.json"

      - name: Validate publish inputs only
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          python scripts/meta_publish.py \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --public-base-url "${{ steps.deployment.outputs.page_url }}${PUBLIC_PATH}" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --facebook-caption "${CONTENT_DIR}/facebook-caption.txt" \
            --linkedin-caption "${CONTENT_DIR}/linkedin-post.txt" \
            --out "${CONTENT_DIR}/github-actions-publish-results.json" \
            --dry-run

      - name: Upload publish log
        uses: actions/upload-artifact@v4
        with:
          name: publish-log
          path: ${{ env.CONTENT_DIR }}/*-publish-results.json
