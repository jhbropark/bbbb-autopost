name: Daily Social Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate without publishing"
        required: false
        default: "false"
  schedule:
    # 09:00 KST
    - cron: "0 0 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-publish:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      META_GRAPH_VERSION: ${{ secrets.META_GRAPH_VERSION }}
      META_SYSTEM_USER_ACCESS_TOKEN: ${{ secrets.META_SYSTEM_USER_ACCESS_TOKEN }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
      LINKEDIN_VERSION: ${{ secrets.LINKEDIN_VERSION || '202605' }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
      X_OAUTH1_ACCESS_TOKEN: ${{ secrets.X_OAUTH1_ACCESS_TOKEN }}
      X_OAUTH1_ACCESS_TOKEN_SECRET: ${{ secrets.X_OAUTH1_ACCESS_TOKEN_SECRET }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
      REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
      REDDIT_SUBREDDIT: ${{ secrets.REDDIT_SUBREDDIT }}
      REDDIT_FLAIR_ID: ${{ secrets.REDDIT_FLAIR_ID }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'gpt-image-2' }}
      INSTAGRAM_COOLDOWN_UNTIL: ${{ vars.INSTAGRAM_COOLDOWN_UNTIL }}
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Sync topic image backgrounds
        run: python scripts/sync_topic_image_assets.py --date "$(date +%F)" --per-topic 8 --search-limit 30 --min-per-topic 5

      - name: Generate date-specific content
        run: |
          CONTENT_DIR="$(python scripts/generate_daily_content.py --date "$(date +%F)")"
          echo "CONTENT_DIR=${CONTENT_DIR}" >> "$GITHUB_ENV"
          echo "CONTENT_SLUG=$(basename "${CONTENT_DIR}")" >> "$GITHUB_ENV"

      - name: Validate publish policy
        run: python scripts/validate_publish_policy.py --content-dir "${CONTENT_DIR}"

      - name: Build X browser publishing handoff
        run: |
          python scripts/x_browser_handoff.py \
            --caption "${CONTENT_DIR}/x-post.txt" \
            --thread "${CONTENT_DIR}/x-thread.txt" \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --out "${CONTENT_DIR}/x-browser-handoff.html"

      - name: Build Instagram Reels video
        run: |
          python scripts/build_instagram_reel.py \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --out "${CONTENT_DIR}/instagram-reel.mp4" \
            --caption-out "${CONTENT_DIR}/instagram-reel-caption.txt"

      - name: Restore GitHub Pages asset history
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          if git ls-remote --exit-code --heads origin pages-history >/dev/null 2>&1; then
            git fetch origin pages-history --depth=1
            git --work-tree="_site" checkout FETCH_HEAD -- . || true
          fi

      - name: Prepare GitHub Pages asset folder
        shell: bash
        run: |
          PUBLIC_PATH="social/${GITHUB_RUN_ID}/${CONTENT_SLUG}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          mkdir -p "_site/${PUBLIC_PATH}"
          cp "${CONTENT_DIR}/carousel/"*.png "_site/${PUBLIC_PATH}/"
          cp "${CONTENT_DIR}/instagram-carousel/"*.jpg "_site/${PUBLIC_PATH}/"
          cp "${CONTENT_DIR}/x-browser-handoff.html" "_site/${PUBLIC_PATH}/"
          cp "${CONTENT_DIR}/instagram-reel.mp4" "_site/${PUBLIC_PATH}/"
          touch "_site/.nojekyll"
          echo "CONTENT_DIR=${CONTENT_DIR}" >> "$GITHUB_ENV"
          echo "PUBLIC_PATH=${PUBLIC_PATH}" >> "$GITHUB_ENV"
          echo "PUBLISH_BASE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/${PUBLIC_PATH}" >> "$GITHUB_ENV"

      - name: Persist GitHub Pages asset history
        shell: bash
        run: |
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B pages-history
          git add -A
          git commit -m "docs: update pages asset history" || exit 0
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin pages-history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages
        timeout-minutes: 3
        uses: actions/deploy-pages@v4

      - name: Check Instagram cooldown
        id: instagram-cooldown
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python scripts/instagram_cooldown.py

      - name: Prevent duplicate Instagram publish
        id: duplicate-check
        if: ${{ github.event.inputs.dry_run != 'true' && steps.instagram-cooldown.outputs.should_publish == 'true' }}
        run: |
          python scripts/prevent_duplicate_instagram_publish.py \
            --caption "${CONTENT_DIR}/instagram-caption.txt"

      - name: Publish Instagram
        if: ${{ github.event.inputs.dry_run != 'true' && steps.instagram-cooldown.outputs.should_publish == 'true' && steps.duplicate-check.outputs.should_publish == 'true' }}
        run: |
          python scripts/meta_publish.py \
            --carousel-dir "${CONTENT_DIR}/instagram-carousel" \
            --public-base-url "${PUBLISH_BASE_URL}" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --facebook-caption "${CONTENT_DIR}/facebook-caption.txt" \
            --channels instagram \
            --out "${CONTENT_DIR}/instagram-publish-results.json" \
            --allow-failures

      - name: Record Instagram cooldown skip
        if: ${{ github.event.inputs.dry_run != 'true' && steps.instagram-cooldown.outputs.should_publish == 'false' }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          out = Path(os.environ["CONTENT_DIR"]) / "instagram-publish-results.json"
          payload = {
              "instagram": {
                  "status": "skipped",
                  "reason": os.environ.get("INSTAGRAM_SKIP_REASON") or "instagram_activity_cooldown",
                  "cooldown_until": os.environ.get("INSTAGRAM_COOLDOWN_UNTIL", ""),
              }
          }
          out.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY
        env:
          INSTAGRAM_SKIP_REASON: ${{ steps.instagram-cooldown.outputs.reason }}

      - name: Record Instagram duplicate skip
        if: ${{ github.event.inputs.dry_run != 'true' && steps.instagram-cooldown.outputs.should_publish == 'true' && steps.duplicate-check.outputs.should_publish == 'false' }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          out = Path(os.environ["CONTENT_DIR"]) / "instagram-publish-results.json"
          payload = {
              "instagram": {
                  "status": "skipped",
                  "reason": "duplicate_caption",
                  "duplicate_permalink": os.environ.get("INSTAGRAM_DUPLICATE_PERMALINK", ""),
                  "duplicate_timestamp": os.environ.get("INSTAGRAM_DUPLICATE_TIMESTAMP", ""),
              }
          }
          out.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY
        env:
          INSTAGRAM_DUPLICATE_PERMALINK: ${{ steps.duplicate-check.outputs.duplicate_permalink }}
          INSTAGRAM_DUPLICATE_TIMESTAMP: ${{ steps.duplicate-check.outputs.duplicate_timestamp }}

      - name: Publish Instagram Reel
        if: ${{ github.event.inputs.dry_run != 'true' && steps.instagram-cooldown.outputs.should_publish == 'true' }}
        continue-on-error: true
        run: |
          python scripts/meta_publish.py \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --public-base-url "${PUBLISH_BASE_URL}" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --instagram-reel-caption "${CONTENT_DIR}/instagram-reel-caption.txt" \
            --instagram-reel-url "${PUBLISH_BASE_URL}/instagram-reel.mp4" \
            --facebook-caption "${CONTENT_DIR}/facebook-caption.txt" \
            --channels instagram_reel \
            --out "${CONTENT_DIR}/instagram-reel-publish-results.json" \
            --allow-failures

      - name: Publish Facebook
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        run: |
          python scripts/meta_publish.py \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --public-base-url "${PUBLISH_BASE_URL}" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --facebook-caption "${CONTENT_DIR}/facebook-caption.txt" \
            --channels facebook \
            --out "${CONTENT_DIR}/facebook-publish-results.json" \
            --allow-failures

      - name: Publish LinkedIn
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        run: |
          python scripts/meta_publish.py \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --public-base-url "${PUBLISH_BASE_URL}" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --facebook-caption "${CONTENT_DIR}/facebook-caption.txt" \
            --linkedin-caption "${CONTENT_DIR}/linkedin-post.txt" \
            --channels linkedin \
            --out "${CONTENT_DIR}/linkedin-publish-results.json" \
            --allow-failures

      - name: Publish LinkedIn English
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        run: |
          python scripts/meta_publish.py \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --public-base-url "${PUBLISH_BASE_URL}" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --facebook-caption "${CONTENT_DIR}/facebook-caption.txt" \
            --linkedin-caption "${CONTENT_DIR}/linkedin-post-en.txt" \
            --channels linkedin \
            --out "${CONTENT_DIR}/linkedin-english-publish-results.json" \
            --allow-failures

      - name: Publish X
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        run: |
          python scripts/meta_publish.py \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --public-base-url "${PUBLISH_BASE_URL}" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --facebook-caption "${CONTENT_DIR}/facebook-caption.txt" \
            --x-caption "${CONTENT_DIR}/x-post.txt" \
            --x-thread "${CONTENT_DIR}/x-thread.txt" \
            --channels x \
            --out "${CONTENT_DIR}/x-publish-results.json" \
            --allow-failures

      - name: Publish Reddit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        run: |
          python scripts/meta_publish.py \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --public-base-url "${PUBLISH_BASE_URL}" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --facebook-caption "${CONTENT_DIR}/facebook-caption.txt" \
            --reddit-title "${CONTENT_DIR}/reddit-title.txt" \
            --reddit-post "${CONTENT_DIR}/reddit-post.txt" \
            --channels reddit \
            --out "${CONTENT_DIR}/reddit-publish-results.json" \
            --allow-failures

      - name: Validate publish inputs only
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          python scripts/meta_publish.py \
            --carousel-dir "${CONTENT_DIR}/carousel" \
            --public-base-url "${PUBLISH_BASE_URL}" \
            --instagram-caption "${CONTENT_DIR}/instagram-caption.txt" \
            --facebook-caption "${CONTENT_DIR}/facebook-caption.txt" \
            --linkedin-caption "${CONTENT_DIR}/linkedin-post.txt" \
            --reddit-title "${CONTENT_DIR}/reddit-title.txt" \
            --reddit-post "${CONTENT_DIR}/reddit-post.txt" \
            --out "${CONTENT_DIR}/github-actions-publish-results.json" \
            --dry-run

      - name: Upload publish log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: publish-log
          path: ${{ env.CONTENT_DIR }}/*-publish-results.json
